name: unperch
description: "FOSS office-wellness companion — water, exercise, and BLE treadmill reminders via TTS."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # Database (Drift / SQLite)
  drift: ^2.22.1
  drift_flutter: ^0.2.4
  sqlite3_flutter_libs: ^0.5.28

  # Lightweight preferences (DataStore wrapper)
  shared_preferences: ^2.3.3

  # Text-to-speech
  flutter_tts: ^4.2.0

  # BLE
  flutter_blue_plus: ^1.35.3

  # Foreground service (Android) + background tasks (iOS)
  flutter_background_service: ^5.0.12

  # Local notifications / reminders
  flutter_local_notifications: ^18.0.1

  # Date / time formatting
  intl: ^0.20.2

  # File path utilities (used by Drift database opener)
  path: ^1.9.0
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

  # App icon generation
  flutter_launcher_icons: ^0.14.1

  # Code generation
  build_runner: ^2.4.13
  drift_dev: ^2.22.1
  riverpod_generator: ^2.6.4

  # Lint
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.4

flutter:
  uses-material-design: true

  assets:
    - assets/icon/
